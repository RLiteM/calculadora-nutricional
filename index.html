<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Diagnóstico Nutricional</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a2e0f1f87f.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="Estilos.css">

</head>
<body>
  <div class="card">
    <h1>Diagnóstico Nutricional</h1>



    <label>Fechas:</label>
    <div class="row">
      <input type="date" id="fecha_nac" placeholder="Nacimiento">
      <input type="date" id="fecha_eval">
    </div>

    <div id="edad">Edad : --</div>

    <label>Peso:</label>
    <div class="row">
      <input type="number" id="libras" placeholder="Libras">
      <input type="number" id="onzas" placeholder="Onzas">
    </div>

    <div id="kilos">Equivale a: 0.00 kg</div>
    

    <label for="talla">Talla (cm):</label>
    <input type="number" id="talla" placeholder="Ej: 110">
    
        <label>Sexo:</label>
    <div class="sexo-buttons">
      <div class="sexo-button" onclick="seleccionarSexo(this, 'masculino')">Masculino</div>
      <div class="sexo-button" onclick="seleccionarSexo(this, 'femenino')">Femenino</div>
    </div>

    <button onclick="enviar()">Calcular</button>
    <button onclick="nuevoCalculo()">Nuevo Cálculo</button>

    <div class="spinner" id="spinner">
      <i class="fas fa-spinner"></i> Calculando...
    </div>

    <div id="resultado" class="resultado"></div>
  </div>

<script src="logsd.js"></script>
</body>
</html>
